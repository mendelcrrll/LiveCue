services:
  whisper:
    image: rt-whisper:local
    ports:
      - "8081:8080"
    volumes:
      - ../../references/whisper.cpp/models:/models:ro
    command:
      [
        "--host", "0.0.0.0",
        "--port", "8080",
        "-m", "/models/ggml-base.en.bin",
        "--convert",
        "--tmp-dir", "/tmp"
      ]
